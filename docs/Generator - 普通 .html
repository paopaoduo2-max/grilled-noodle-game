<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>神秘工具 - 总控台 (V26 Final)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --main: #0f0; --bg: #050505; --panel: #111; }
        body { background-color: var(--bg); color: var(--main); font-family: "Consolas", monospace; padding: 40px; display: flex; justify-content: center; }
        
        .terminal {
            width: 700px; border: 2px solid var(--main); background: var(--panel);
            padding: 40px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); position: relative;
        }
        .terminal::before { content: " [ SYSTEM_ROOT_V26 ] "; position: absolute; top: -12px; left: 30px; background: var(--bg); padding: 0 10px; font-weight: bold; border: 1px solid var(--main); }

        h1 { text-align: center; border-bottom: 2px dashed var(--main); padding-bottom: 20px; margin-top: 0; text-shadow: 0 0 5px var(--main); letter-spacing: 4px; font-size: 32px; }
        
        .group { margin: 25px 0; }
        label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 16px; }
        input, select { 
            width: 100%; background: #000; border: 1px solid #333; color: var(--main); 
            padding: 15px; font-family: inherit; font-size: 16px; outline: none; box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--main); box-shadow: 0 0 10px rgba(0,255,0,0.3); }

        /* 日期快捷按钮 */
        .date-btns { display: flex; gap: 10px; margin-top: 10px; }
        .date-btn {
            flex: 1; background: #002200; color: #0f0; border: 1px solid #0f0; padding: 8px; cursor: pointer;
            font-family: inherit; font-size: 14px; transition: 0.2s;
        }
        .date-btn:hover { background: #0f0; color: #000; }

        .license-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px;
            margin-top: 8px;
        }
        .license-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #0f0;
            font-size: 14px;
            background: rgba(0, 255, 0, 0.06);
        }
        .license-option input {
            accent-color: #0f0;
            width: 16px;
            height: 16px;
        }
        .license-tip {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        button.main-btn {
            width: 100%; background: #000; color: var(--main); border: 2px solid var(--main);
            padding: 20px; font-size: 20px; font-family: inherit; font-weight: bold; cursor: pointer;
            transition: 0.3s; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px;
        }
        button.main-btn:hover { background: var(--main); color: #000; box-shadow: 0 0 30px var(--main); }
        
        .log { margin-top: 30px; border-top: 1px dotted #333; padding-top: 15px; font-size: 14px; color: #0a0; opacity: 0.8; height: 120px; overflow-y: auto; }
        .tip { font-size: 14px; color: #666; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>/// Generator V26 ///</h1>
    
    <div class="group">
        <label>> 1. 设置访问口令 (ACCESS_PASSWORD):</label>
        <input type="text" id="setPwd" value="888888">
    </div>

    <div class="group">
        <label>> 2. 设置工具使用有效期 (TOOL_EXPIRY):</label>
        <input type="date" id="setExp">
        <div class="date-btns">
            <button class="date-btn" onclick="setDate('d')">+1 天</button>
            <button class="date-btn" onclick="setDate('m')">+1 个月</button>
            <button class="date-btn" onclick="setDate('y')">+1 年</button>
            <button class="date-btn" onclick="setDate('yy')">+10 年</button>
        </div>
    </div>

    <div class="group">
        <label>> 3. 设置安装包存活时间 (INSTALLER_LIFETIME):</label>
        <div style="font-size:12px; color:#666; margin-bottom:5px;">* 超过此时间未安装，安装包将彻底报废，防止二次传播</div>
        <select id="installTimeLimit">
            <option value="300000">5 分钟 (推荐)</option>
            <option value="600000">10 分钟</option>
            <option value="1800000">30 分钟</option>
            <option value="3600000">1 小时</option>
            <option value="86400000">24 小时</option>
        </select>
    </div>

    <div class="group">
        <label>> 4. 离线许可证卡种:</label>
        <div class="license-grid">
            <label class="license-option">
                <input type="checkbox" value="day" checked>
                <span>天卡 · 24 小时</span>
            </label>
            <label class="license-option">
                <input type="checkbox" value="month" checked>
                <span>月卡 · 30 天</span>
            </label>
            <label class="license-option">
                <input type="checkbox" value="year">
                <span>年卡 · 365 天</span>
            </label>
            <label class="license-option">
                <input type="checkbox" value="decade">
                <span>十年卡 · 3650 天</span>
            </label>
        </div>
        <div class="license-tip">可同时选中多种卡片，安装后只需其中一张未过期即可启动，重装会根据新的卡片重新生成。</div>
    </div>

    <button class="main-btn" onclick="buildInstaller()">[ 初始化编译程序 ]</button>
    <div class="tip">V26 特性：时间熔断机制 / 单次安装锁 / 完美画质</div>

    <div class="log" id="sysLog">
        > 系统内核 V26 已加载...<br>
        > 熔断机制 (Time Bomb) 已就绪...<br>
        > 等待指令...<br>
    </div>
</div>

<!-- ================= 核心 Payload (V21 完美画质版) ================= -->
<textarea id="toolSource" style="display:none;">
    <!-- 界面 -->
    <div id="appInterface">
        <h1>神秘工具</h1>
        
        <div class="panel">
            <div class="panel-head">>> DATA_SOURCE</div>
            <div class="control-row">
                <label>导入 Excel 数据表:</label>
                <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" onchange="window.handleExcel(this)">
            </div>
            <div class="control-row">
                <label>选择数据列 (该列内容将作为文件名):</label>
                <select id="colSelect" disabled><option>等待载入...</option></select>
                <div id="colInfoDisplay" class="col-info"></div>
                <div id="dataPreview" style="font-size:14px;color:#888;margin-top:10px;border-left:3px solid #333;padding-left:15px;"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-head">>> ASSET_SOURCE</div>
            <div class="control-row">
                <label>选择图片文件夹:</label>
                <input type="file" id="imgFolder" webkitdirectory directory multiple>
            </div>
        </div>

        <div class="panel">
            <div class="panel-head">>> CONFIGURATION</div>
            <div class="grid-2">
                <div><label>字体大小 (px):</label><input type="number" id="fontSize" value="80"></div>
                <div><label>字体颜色 (默认黑色):</label><input type="color" id="fontColor" value="#000000"></div>
                <div><label>水平随机偏移 (%):</label><input type="number" id="rangeX" value="5"></div>
                <div><label>垂直随机偏移 (%):</label><input type="number" id="rangeY" value="5"></div>
            </div>
        </div>

        <button class="action-btn" id="runBtn" onclick="window.startTask()">[ 启动融合程序 (将请求保存目录) ]</button>
        <div id="console">>> 系统控制台已就绪 (输出规格: 800x600 等比)...</div>
    </div>

    <!-- 逻辑 -->
    <script id="appLogic">
        window.wb = null;
        window.sheetData = [];

        window.log = function(msg) {
            const c = document.getElementById('console');
            if(c) {
                c.innerHTML += "<div>> " + msg + "</div>";
                c.scrollTop = c.scrollHeight;
            }
        }

        window.handleExcel = function(input) {
            const f = input.files[0];
            if(!f) return;
            const r = new FileReader();
            r.onload = function(e) {
                try {
                    window.wb = XLSX.read(e.target.result, {type:'array'});
                    window.sheetData = XLSX.utils.sheet_to_json(window.wb.Sheets[window.wb.SheetNames[0]], {header:1});
                    if(window.sheetData.length) {
                        const sel = document.getElementById('colSelect');
                        sel.innerHTML = ''; sel.disabled = false;
                        window.sheetData[0].forEach((h, i) => {
                            sel.add(new Option(h || ('第 '+(i+1)+' 列'), i));
                        });
                        window.updatePreview(0);
                        sel.onchange = function(ev) { window.updatePreview(ev.target.value); };
                        window.log("数据表载入完成，共 " + window.sheetData.length + " 行");
                    }
                } catch(err) { window.log("读取表格失败: " + err.message); }
            };
            r.readAsArrayBuffer(f);
        }

        window.updatePreview = function(idx) {
            document.getElementById('colInfoDisplay').innerText = "当前选中: 第 " + (parseInt(idx)+1) + " 列";
            const txt = window.sheetData.slice(1, 6).map(r => r[idx]).join(', ');
            document.getElementById('dataPreview').innerText = "数据/文件名预览: " + txt + "...";
        }

        window.startTask = async function() {
            const folder = document.getElementById('imgFolder');
            const colIdx = document.getElementById('colSelect').value;
            
            if(!window.wb || !folder.files.length) return alert("错误：请先导入表格并选择图片文件夹");

            let dh;
            try { dh = await window.showDirectoryPicker(); } catch(e) { return; }

            const btn = document.getElementById('runBtn');
            btn.innerText = "[ 正在处理中... ]";
            btn.disabled = true;

            const nums = window.sheetData.slice(1).map(r => r[colIdx]).filter(v => v).map(String);
            const imgs = Array.from(folder.files).filter(f => f.type.startsWith('image/'));
            
            // 智能计算总数
            const total = Math.min(nums.length, imgs.length);

            window.log("任务队列启动，计划处理: " + total + " 项");

            try {
                for(let i=0; i<total; i++) {
                    try {
                        const contentText = nums[i];
                        
                        let safeFileName = contentText.replace(/[\\/:*?"<>|]/g, "_");
                        if(safeFileName.length === 0) safeFileName = "output_" + i;
                        const finalFileName = safeFileName + ".jpg";

                        const blob = await window.draw(imgs[i], contentText);
                        
                        const fh = await dh.getFileHandle(finalFileName, {create:true});
                        const w = await fh.createWritable();
                        await w.write(blob);
                        await w.close();
                        window.log("已生成: " + finalFileName);
                    } catch(err) {
                        window.log("ERR (行" + (i+1) + "): " + err.message);
                    }
                }
                
                let finishMsg = ">> 任务结束！";
                if (nums.length > imgs.length) {
                    finishMsg += "\n[提示] 图片已用尽！剩余 " + (nums.length - imgs.length) + " 行数据未处理。";
                } else if (imgs.length > nums.length) {
                    finishMsg += "\n[提示] 数据已用尽！剩余 " + (imgs.length - nums.length) + " 张图片未处理。";
                } else {
                    finishMsg += "\n[完美] 数据与图片数量一致，全部完成。";
                }
                
                window.log(finishMsg);
                alert(finishMsg);

            } catch(e) {
                window.log("中断: " + e.message);
            } finally {
                btn.innerText = "[ 启动融合程序 (将请求保存目录) ]";
                btn.disabled = false;
            }
        }

        window.draw = function(imgFile, txt) {
            return new Promise(async resolve => {
                const bmp = await createImageBitmap(imgFile);
                const cvs = document.createElement('canvas');
                const targetW = 800;
                const targetH = 600;
                cvs.width = targetW;
                cvs.height = targetH;
                const ctx = cvs.getContext('2d');

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, targetW, targetH);

                const scale = Math.min(targetW / bmp.width, targetH / bmp.height);
                const drawW = bmp.width * scale;
                const drawH = bmp.height * scale;
                
                const offsetX = (targetW - drawW) / 2;
                const offsetY = (targetH - drawH) / 2;

                ctx.drawImage(bmp, offsetX, offsetY, drawW, drawH);

                const fs = document.getElementById('fontSize').value;
                const fc = document.getElementById('fontColor').value;
                const rx = document.getElementById('rangeX').value / 100;
                const ry = document.getElementById('rangeY').value / 100;

                ctx.font = "bold " + fs + "px 'SimHei', sans-serif";
                ctx.fillStyle = fc;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                const dx = (Math.random()-0.5) * 2 * targetW * rx;
                const dy = (Math.random()-0.5) * 2 * targetH * ry;

                ctx.fillText(txt, targetW/2 + dx, targetH*0.75 + dy);
                cvs.toBlob(resolve, 'image/jpeg', 0.9);
            });
        }
    </script>
</textarea>

<!-- ================= Generator Logic ================= -->
<script>
    // 初始化
    window.onload = function() {
        setDate('y'); // 默认1年
    };

    function setDate(type) {
        const d = new Date();
        if(type === 'd') d.setDate(d.getDate() + 1);
        if(type === 'm') d.setMonth(d.getMonth() + 1);
        if(type === 'y') d.setFullYear(d.getFullYear() + 1);
        if(type === 'yy') d.setFullYear(d.getFullYear() + 10);
        document.getElementById('setExp').value = d.toISOString().split('T')[0];
        log("工具有效期已设定: " + d.toLocaleDateString());
    }

    function log(msg) { document.getElementById('sysLog').innerHTML += "<br>> " + msg; }

    const licensePresets = {
        day: { type: "day", label: "天卡", days: 1 },
        month: { type: "month", label: "月卡", days: 30 },
        year: { type: "year", label: "年卡", days: 365 },
        decade: { type: "decade", label: "十年卡", days: 3650 },
    };

    function getSelectedCards() {
        const boxes = document.querySelectorAll('.license-option input[type="checkbox"]');
        return Array.from(boxes)
            .filter(box => box.checked)
            .map(box => {
                const preset = licensePresets[box.value];
                return preset ? { ...preset } : null;
            })
            .filter(Boolean);
    }

    function buildInstaller() {
        const pwd = document.getElementById('setPwd').value;
        const exp = document.getElementById('setExp').value;
        const limit = document.getElementById('installTimeLimit').value; // 获取安装包存活时间
        
        if(!pwd || !exp) return alert("错误：请填写完整参数");

        log("封装内核...");
        const rawToolCode = document.getElementById('toolSource').value;
        const safeRawData = encodeURIComponent(rawToolCode);

        log("配置时间引信: " + (limit/60000) + "分钟...");
        // 传递 limit 到安装器生成函数
        const installerHtml = createInstaller(pwd, exp, safeRawData, limit);

        const blob = new Blob([installerHtml], {type: "text/html"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "安装程序_Installer.html";
        link.click();
        log(">> 编译成功！");
    }

    // 安装器生成：引入 Time Bomb 和 One-Time Lock
    function createInstaller(pwd, exp, safeData, timeLimit) {
        // 获取生成时的时间戳
        const buildTime = Date.now();
        
        return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>环境初始化</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"><` + `/script>
<style>
    body{background:#000;color:#0f0;font-family:"Consolas",monospace;margin:0;height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;}
    .box{border:2px solid #0f0;padding:50px;width:500px;text-align:center;box-shadow:0 0 30px rgba(0,255,0,0.2);background:rgba(0,10,0,0.9);backdrop-filter:blur(5px);}
    h2{border-bottom:2px dashed #0f0;padding-bottom:15px;margin-top:0;letter-spacing:4px;font-size:24px;}
    button{background:rgba(0,20,0,0.8);color:#0f0;border:2px solid #0f0;padding:15px;width:100%;font-size:18px;font-weight:bold;cursor:pointer;margin-top:30px;transition:0.3s;}
    button:hover{background:#0f0;color:#000;box-shadow:0 0 20px #0f0;}
    .info{font-size:14px;color:#0a0;margin-top:20px;text-align:left;line-height:1.8;}
    /* 销毁样式 */
    .destruct { border-color: red !important; box-shadow: 0 0 50px red !important; color: red !important; }
    .destruct h2 { border-color: red !important; border-bottom-color: red !important; }
    .destruct button { display: none; }
</style>
</head>
<body>
<div class="box" id="mainBox">
    <h2 id="title">>> 初始化向导</h2>
    <div class="info" id="infoArea">
        > 正在扫描硬件指纹... [OK]<br>
        > 目标权限: 本机绑定<br>
        > 工具有效期至: ${exp}<br>
        > 状态: 等待生成
    </div>
    <button onclick="install()">[ 生成神秘工具 ]</button>
</div>
<div id="hiddenSrc" style="display:none;">${safeData}</div>
<script>
    const P="${pwd}", E="${exp}";
    // V26 核心：时间戳校验
    const BUILD_TIME = ${buildTime};
    const LIFE_LIMIT = ${timeLimit}; // 毫秒

    // 页面加载时立即检查
    window.onload = function() {
        checkStatus();
        setInterval(checkStatus, 1000);
    }

    function checkStatus() {
        const now = Date.now();
        const used = localStorage.getItem('INSTALLER_USED_' + BUILD_TIME); // 唯一标识锁
        
        // 1. 检查是否过期
        if (now - BUILD_TIME > LIFE_LIMIT) {
            triggerDestruct("🚫 安装包已过期", "此文件已超过设定的安全时效。<br>无法继续使用，请删除。");
            return false;
        }
        // 2. 检查是否已使用 (空间锁)
        if (used) {
            triggerDestruct("🚫 安装包已失效", "此安装包已在当前设备使用过。<br>为防止滥用，已自动锁定。");
            return false;
        }
        return true;
    }

    function triggerDestruct(title, msg) {
        const box = document.getElementById('mainBox');
        if(box.classList.contains('destruct')) return; // 已销毁则不重复
        
        document.title = "已销毁";
        box.classList.add('destruct');
        document.getElementById('title').innerText = title;
        document.getElementById('infoArea').innerHTML = msg;
    }

    async function install() {
        if(!checkStatus()) return;

        try {
            const hw=navigator.userAgent+(navigator.hardwareConcurrency||4)+navigator.language+screen.colorDepth;
            const key=P+hw;
            const src=decodeURIComponent(document.getElementById('hiddenSrc').innerText);
            const enc=CryptoJS.AES.encrypt(src,key).toString();
            const finalTool=buildFinalTool(enc,E);
            
            if(window.showSaveFilePicker){
                try{
                    const h=await window.showSaveFilePicker({suggestedName:'神秘工具.html',types:[{description:'HTML App',accept:{'text/html':['.html']}}]});
                    const w=await h.createWritable();await w.write(finalTool);await w.close();
                    
                    // 标记为已使用
                    localStorage.setItem('INSTALLER_USED_' + BUILD_TIME, 'true');
                    // 立即触发界面销毁
                    triggerDestruct("🚫 安装完成", "工具已生成。<br>此安装程序已自动销毁。<br>请手动删除此文件。");
                    return;
                }catch(e){
                    // 用户取消保存，不销毁
                    return; 
                }
            }
            
            // 降级模式
            const b=new Blob([finalTool],{type:"text/html"});
            const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="神秘工具.html";a.click();
            
            // 标记并销毁
            localStorage.setItem('INSTALLER_USED_' + BUILD_TIME, 'true');
            setTimeout(() => {
                triggerDestruct("🚫 安装完成", "工具已生成。<br>此安装程序已自动销毁。");
            }, 2000);

        }catch(e){alert("Error:"+e.message);}
    }

    function buildFinalTool(enc, expDate) {
        return \`<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>神秘工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\`+\`/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"><\`+\`/script>
<style>
    :root{--c:#0f0;--bg:#000;}
    body{background:var(--bg);color:var(--c);font-family:"Consolas",monospace;margin:0;padding:20px;min-height:100vh;box-sizing:border-box;}

    #appInterface::before { content: " [ SECURE_SHELL_ACTIVE ] "; position: absolute; top: -14px; left: 30px; background: #000; color: #666; font-size: 14px; padding: 0 10px; border: 1px solid #333; }

            for(let i=0; i<scripts.length; i++) { eval(scripts[i].innerText); }
        }catch(e){console.error(e);msg("口令错误或设备不匹配");}
