<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>刮刮乐UI原型（可完整迁移版）</title>
    <style>
      :root {
        --paper: #f7f1e3;
        --ink: #2e2a27;
        --panel: #24313a;
        --accent: #e94f37;
        --gold: #f6c453;
        --shadow: #000000;
        --chip: #1b1b1b;
        --scratch: #b0b6bd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #e9dfc8;
        color: var(--ink);
        font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }

      .app {
        width: min(1100px, 100%);
        display: grid;
        gap: 16px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 12px;
        align-items: center;
      }

      .chip {
        position: relative;
        padding: 8px 12px;
        background: var(--chip);
        color: #fff8e0;
        border: 3px solid var(--shadow);
        border-radius: 12px;
        font-size: 14px;
        width: fit-content;
      }

      .chip::after {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--shadow);
        border-radius: 12px;
        transform: translate(4px, 4px);
        z-index: -1;
      }

      .title-block {
        text-align: center;
      }

      .title {
        display: inline-block;
        padding: 8px 16px;
        background: #1b1b1b;
        color: var(--gold);
        border: 4px solid var(--shadow);
        border-radius: 12px;
        font-size: 24px;
        font-weight: bold;
      }

      .subtitle {
        margin-top: 6px;
        display: inline-block;
        padding: 4px 10px;
        background: var(--paper);
        border: 2px solid var(--shadow);
        border-radius: 8px;
        font-size: 12px;
      }

      .panel {
        position: relative;
        width: 780px;
        height: 720px;
        margin: 0 auto;
      }

      .panel-shadow {
        position: absolute;
        inset: 0;
        background: var(--shadow);
        border-radius: 20px;
        transform: translate(8px, 8px);
      }

      .panel-inner {
        position: relative;
        z-index: 1;
        height: 100%;
        padding: 16px;
        background: var(--panel);
        border: 4px solid var(--shadow);
        border-radius: 20px;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 12px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: #1b242b;
        border: 3px solid var(--shadow);
        border-radius: 12px;
      }

      .header-title {
        color: var(--gold);
        font-size: 20px;
        font-weight: bold;
      }

      .btn {
        border: 3px solid var(--shadow);
        background: var(--gold);
        border-radius: 10px;
        padding: 6px 12px;
        font-weight: bold;
        cursor: pointer;
      }

      .btn.help {
        width: 26px;
        height: 26px;
        padding: 0;
        border-radius: 50%;
        background: #ffffff;
      }

      .btn.next {
        width: 100%;
        margin-top: auto;
        background: #ffffff;
      }

      .tip-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .tip-text {
        flex: 1;
        padding: 6px 10px;
        background: var(--paper);
        border: 2px solid var(--shadow);
        border-radius: 8px;
        font-size: 12px;
      }

      .help-pop {
        position: absolute;
        top: 120px;
        left: 40px;
        background: #ffffff;
        border: 2px solid var(--shadow);
        border-radius: 8px;
        padding: 6px 8px;
        font-size: 12px;
        display: none;
      }

      .help-pop.show {
        display: block;
      }

      .content {
        display: grid;
        grid-template-columns: 560px 200px;
        gap: 12px;
      }

      .card-area {
        display: grid;
        place-items: center;
      }

      .scratch-card {
        position: relative;
        width: 560px;
        height: 520px;
      }

      .card-shadow {
        position: absolute;
        inset: 0;
        background: var(--shadow);
        border-radius: 16px;
        transform: translate(6px, 6px);
      }

      .card-inner {
        position: relative;
        z-index: 1;
        height: 100%;
        padding: 12px;
        background: var(--paper);
        border: 3px solid var(--shadow);
        border-radius: 16px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 10px;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 10px;
        background: #ffe2a8;
        border: 2px solid var(--shadow);
        border-radius: 10px;
      }

      .badge {
        padding: 2px 6px;
        background: var(--accent);
        color: #ffffff;
        border: 2px solid var(--shadow);
        border-radius: 8px;
        font-size: 12px;
      }

      .win-number {
        font-size: 18px;
        font-weight: bold;
      }

      .scratch-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }

      .cell {
        background: #ffffff;
        border: 2px solid var(--shadow);
        border-radius: 8px;
        min-height: 56px;
        display: grid;
        gap: 4px;
        place-items: center;
      }

      .cell .num {
        font-size: 18px;
      }

      .cell .amount {
        font-size: 12px;
        color: #7a4b18;
      }

      .card-footer {
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }

      .rule {
        flex: 1;
        background: #ffffff;
        border: 2px solid var(--shadow);
        border-radius: 8px;
        padding: 4px 6px;
        font-size: 12px;
        text-align: center;
      }

      #scratchCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border-radius: 16px;
        cursor: pointer;
        z-index: 3;
        touch-action: none;
      }

      #scratchCanvas.revealed {
        opacity: 0;
        pointer-events: none;
      }

      .stamp {
        position: absolute;
        right: 16px;
        bottom: 16px;
        padding: 8px 12px;
        border: 3px solid var(--accent);
        border-radius: 999px;
        background: #ffffff;
        color: var(--accent);
        font-weight: bold;
        transform: rotate(-8deg) scale(0);
        opacity: 0;
        z-index: 4;
      }

      .stamp.win {
        border-color: #4caf50;
        color: #4caf50;
      }

      .stamp.show {
        animation: stampPop 0.3s ease-out forwards;
      }

      .tier-column {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .tier {
        background: #f4e3c7;
        border: 3px solid var(--shadow);
        border-radius: 12px;
        padding: 10px;
        text-align: left;
        cursor: pointer;
      }

      .tier.active {
        border-color: var(--gold);
      }

      .tier-bar {
        height: 6px;
        border-radius: 4px;
        margin-bottom: 6px;
        border: 2px solid var(--shadow);
      }

      .tier-title {
        font-size: 16px;
        font-weight: bold;
      }

      .tier-price {
        font-size: 20px;
        margin-top: 2px;
      }

      .tier-meta {
        font-size: 12px;
        margin-top: 4px;
        color: #5a4a39;
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .streak {
        background: var(--paper);
        border: 2px solid var(--shadow);
        border-radius: 8px;
        padding: 6px 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }

      .dots {
        display: flex;
        gap: 6px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 2px solid var(--shadow);
        background: #d0d0d0;
      }

      .dot.active {
        background: var(--accent);
      }

      .result {
        background: #1b1b1b;
        color: #ffffff;
        border: 2px solid var(--shadow);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
      }

      @keyframes stampPop {
        0% {
          transform: rotate(-8deg) scale(0);
          opacity: 0;
        }
        100% {
          transform: rotate(-8deg) scale(1);
          opacity: 1;
        }
      }

      @media (max-width: 960px) {
        .panel {
          width: 100%;
          height: auto;
        }

        .panel-inner {
          grid-template-rows: auto auto auto auto;
        }

        .content {
          grid-template-columns: 1fr;
        }

        .scratch-card {
          width: 100%;
          height: 480px;
        }

        .topbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="topbar">
        <div class="chip">钱包：<span id="wallet">1280</span> 币</div>
        <div class="title-block">
          <div class="title">幸运刮刮乐</div>
          <div class="subtitle">刮开看看，万一发财了呢！</div>
        </div>
        <div class="chip">营业中：<span id="clock">11:30</span></div>
      </div>

      <section class="panel">
        <div class="panel-shadow"></div>
        <div class="panel-inner">
          <div class="header">
            <div class="header-title">幸运彩票站</div>
            <button class="btn" id="backBtn">返回摊位</button>
          </div>

          <div class="tip-row">
            <div class="tip-text">连不中3次必小奖 · 彩虹卡2%奖励x2</div>
            <button class="btn help" id="helpBtn">?</button>
            <div class="help-pop" id="helpPop">刮开70%即可开奖</div>
          </div>

          <div class="content">
            <div class="card-area">
              <div class="scratch-card" id="ticketCard">
                <div class="card-shadow"></div>
                <div class="card-inner">
                  <div class="card-header">
                    <span class="badge">中奖号</span>
                    <span class="win-number" id="winNums">8 3 1</span>
                    <span class="badge">刮开兑奖</span>
                  </div>
                  <div class="scratch-grid" id="scratchGrid"></div>
                  <div class="card-footer">
                    <div class="rule">刮开70%即可开奖</div>
                    <div class="rule">号码相同即可中奖</div>
                  </div>
                </div>
                <canvas id="scratchCanvas"></canvas>
                <div class="stamp" id="resultStamp">中奖</div>
              </div>
            </div>

            <aside class="tier-column">
              <button class="tier active" data-price="10">
                <div class="tier-bar" style="background:#cd7f32;"></div>
                <div class="tier-title">铜卡</div>
                <div class="tier-price">10 币</div>
                <div class="tier-meta">中奖率 40% · 最高 30 币</div>
              </button>
              <button class="tier" data-price="20">
                <div class="tier-bar" style="background:#c0c0c0;"></div>
                <div class="tier-title">银卡</div>
                <div class="tier-price">20 币</div>
                <div class="tier-meta">中奖率 35% · 最高 80 币</div>
              </button>
              <button class="tier" data-price="50">
                <div class="tier-bar" style="background:#ffd700;"></div>
                <div class="tier-title">金卡</div>
                <div class="tier-price">50 币</div>
                <div class="tier-meta">中奖率 30% · 最高 200 币</div>
              </button>
              <button class="btn next" id="nextBtn">再来一张</button>
            </aside>
          </div>

          <div class="footer">
            <div class="streak">
              连不中进度
              <div class="dots" id="streakDots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
              </div>
            </div>
            <div class="result" id="resultText">刮开看看！</div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const grid = document.getElementById("scratchGrid");
      const winNums = document.getElementById("winNums");
      const stamp = document.getElementById("resultStamp");
      const resultText = document.getElementById("resultText");
      const streakDots = Array.from(document.querySelectorAll(".dot"));
      const tiers = Array.from(document.querySelectorAll(".tier"));
      const wallet = document.getElementById("wallet");
      const helpBtn = document.getElementById("helpBtn");
      const helpPop = document.getElementById("helpPop");
      const nextBtn = document.getElementById("nextBtn");

      const state = {
        streak: 0,
        win: false,
        price: 10
      };

      function fillNumbers() {
        const wins = [8, 3, 1];
        winNums.textContent = wins.join(" ");
        grid.innerHTML = "";
        for (let i = 0; i < 20; i++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          const num = document.createElement("div");
          num.className = "num";
          num.textContent = String(Math.floor(Math.random() * 90 + 10));
          const amt = document.createElement("div");
          amt.className = "amount";
          amt.textContent = `${Math.floor(Math.random() * 9 + 1) * 10} 币`;
          cell.appendChild(num);
          cell.appendChild(amt);
          grid.appendChild(cell);
        }
      }

      fillNumbers();

      tiers.forEach((tier) => {
        tier.addEventListener("click", () => {
          tiers.forEach((t) => t.classList.remove("active"));
          tier.classList.add("active");
          state.price = Number(tier.dataset.price || 10);
          buyTicket();
        });
      });

      helpBtn.addEventListener("click", () => {
        helpPop.classList.toggle("show");
      });

      const canvas = document.getElementById("scratchCanvas");
      const ctx = canvas.getContext("2d");
      const dpr = Math.max(window.devicePixelRatio || 1, 1);
      let drawing = false;
      let lastSample = 0;

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        drawCover();
      }

      function drawCover() {
        const rect = canvas.getBoundingClientRect();
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "#b0b6bd";
        ctx.fillRect(0, 0, rect.width, rect.height);
        canvas.classList.remove("revealed");
        stamp.classList.remove("show");
      }

      function scratch(x, y) {
        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.arc(x, y, 26, 0, Math.PI * 2);
        ctx.fill();
      }

      function checkProgress() {
        const now = Date.now();
        if (now - lastSample < 300) return;
        lastSample = now;
        const { width, height } = canvas;
        const data = ctx.getImageData(0, 0, width, height).data;
        let transparent = 0;
        const step = 20 * dpr;
        for (let i = 3; i < data.length; i += 4 * step) {
          if (data[i] === 0) transparent++;
        }
        const percent = transparent / (data.length / (4 * step));
        if (percent > 0.6) {
          revealResult();
        }
      }

      function revealResult() {
        canvas.classList.add("revealed");
        state.win = Math.random() < 0.45;
        stamp.textContent = state.win ? "中奖" : "谢谢参与";
        stamp.classList.toggle("win", state.win);
        stamp.classList.add("show");
        resultText.textContent = state.win ? "恭喜！奖励 +50 币" : "差一点，再来一张！";
        state.streak = state.win ? 0 : Math.min(state.streak + 1, 3);
        streakDots.forEach((dot, i) => dot.classList.toggle("active", i < state.streak));
      }

      function buyTicket() {
        const value = Number(wallet.textContent) || 0;
        wallet.textContent = String(Math.max(0, value - state.price));
        fillNumbers();
        drawCover();
        resultText.textContent = "刮开看看！";
      }

      nextBtn.addEventListener("click", buyTicket);

      canvas.addEventListener("pointerdown", (e) => {
        drawing = true;
        const rect = canvas.getBoundingClientRect();
        scratch(e.clientX - rect.left, e.clientY - rect.top);
      });

      canvas.addEventListener("pointermove", (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        scratch(e.clientX - rect.left, e.clientY - rect.top);
        checkProgress();
      });

      canvas.addEventListener("pointerup", () => {
        drawing = false;
      });

      canvas.addEventListener("pointerleave", () => {
        drawing = false;
      });

      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();
    </script>
  </body>
</html>
