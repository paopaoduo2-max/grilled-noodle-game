<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷面人生 - 店招牌匾首页稿 V2</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@700;900&display=swap");

        :root {
            --cold-1: #d8e6f5;
            --cold-2: #98b2cf;
            --cold-3: #607d9f;
            --warm-1: #ffe8bd;
            --warm-2: #ffbf76;
            --warm-3: #e67a4d;
            --wood-1: #744531;
            --wood-2: #5a3427;
            --ink: #522a1f;
            --paper: #fff4e6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 211, 144, 0.16), transparent 26%),
                linear-gradient(180deg, #281814 0%, #1e120f 100%);
        }

        .screen {
            position: relative;
            width: min(1280px, 100vw);
            height: min(720px, 100vh);
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 18%, rgba(255,255,255,0.42), transparent 18%),
                radial-gradient(circle at 82% 18%, rgba(255,248,218,0.46), transparent 18%),
                linear-gradient(90deg,
                    var(--cold-1) 0%,
                    var(--cold-2) 27%,
                    #d9cec6 45%,
                    #edd3b0 55%,
                    var(--warm-1) 73%,
                    var(--warm-2) 87%,
                    var(--warm-3) 100%);
        }

        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.05)),
                linear-gradient(90deg, rgba(81, 109, 145, 0.1), transparent 36%, transparent 64%, rgba(221, 111, 62, 0.1));
            pointer-events: none;
        }

        .screen::after {
            content: "";
            position: absolute;
            left: 50%;
            top: -14%;
            bottom: -14%;
            width: 180px;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(255,255,255,0.28), rgba(255,255,255,0.06) 42%, transparent 76%);
            filter: blur(18px);
            pointer-events: none;
        }

        .settings {
            position: absolute;
            top: 32px;
            right: 34px;
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border-radius: 16px;
            background: rgba(255, 248, 240, 0.6);
            backdrop-filter: blur(10px);
            color: rgba(84, 41, 29, 0.84);
            font-size: 22px;
            box-shadow: 0 12px 24px rgba(53, 19, 10, 0.1);
            z-index: 5;
        }

        .ornament {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        .ornament .ring {
            position: absolute;
            border: 2px solid rgba(255, 250, 242, 0.18);
            border-radius: 999px;
        }

        .ornament .ring.left {
            left: 86px;
            top: 128px;
            width: 218px;
            height: 218px;
        }

        .ornament .ring.right {
            right: 84px;
            bottom: 92px;
            width: 250px;
            height: 250px;
        }

        .center {
            position: absolute;
            left: 50%;
            top: 86px;
            width: 430px;
            transform: translateX(-50%);
            text-align: center;
            z-index: 4;
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 18px;
            padding: 8px 16px;
            border-radius: 999px;
            background: rgba(255, 248, 240, 0.38);
            backdrop-filter: blur(8px);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.2em;
            color: rgba(91, 45, 31, 0.7);
        }

        .plaque-wrap {
            position: relative;
            margin: 0 auto;
            width: 430px;
        }

        .plaque-shadow {
            position: absolute;
            inset: 10px 12px -2px;
            border-radius: 24px;
            background: rgba(59, 28, 20, 0.18);
            filter: blur(10px);
            transform: translateY(10px);
        }

        .plaque {
            position: relative;
            padding: 20px 24px 22px;
            border-radius: 24px;
            background:
                linear-gradient(180deg, rgba(140, 88, 61, 0.96), rgba(101, 61, 44, 0.98) 56%, rgba(70, 40, 31, 0.98) 100%);
            border: 4px solid rgba(246, 223, 191, 0.72);
            box-shadow:
                inset 0 2px 0 rgba(255, 236, 209, 0.24),
                inset 0 -8px 16px rgba(44, 20, 13, 0.2),
                0 22px 48px rgba(38, 14, 8, 0.18);
            overflow: hidden;
        }

        .plaque::before {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 16px;
            border: 2px solid rgba(255, 236, 209, 0.14);
        }

        .plaque::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(255,255,255,0.05), transparent 18%, transparent 78%, rgba(0,0,0,0.06)),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 2px, rgba(0,0,0,0.016) 2px 4px);
            opacity: 0.5;
            pointer-events: none;
        }

        .title {
            position: relative;
            margin: 0;
            white-space: nowrap;
            font-family: "Noto Serif SC", serif;
            font-size: 76px;
            line-height: 1;
            letter-spacing: 0.1em;
            text-indent: 0.1em;
            color: var(--paper);
            text-shadow:
                -2px 0 0 rgba(122, 154, 193, 0.34),
                2px 0 0 rgba(223, 130, 77, 0.28),
                0 4px 0 rgba(63, 29, 20, 0.15),
                0 12px 18px rgba(34, 12, 8, 0.18);
            z-index: 1;
        }

        .title .cold {
            color: #edf7ff;
        }

        .title .warm {
            color: #fff1dd;
        }

        .subtitle {
            margin: 18px auto 0;
            max-width: 390px;
            font-size: 16px;
            line-height: 1.9;
            font-weight: 700;
            color: rgba(93, 47, 33, 0.84);
        }

        .subtitle .brush {
            display: inline-block;
            margin-left: 6px;
            font-family: "Ma Shan Zheng", cursive;
            font-size: 22px;
            color: rgba(128, 60, 37, 0.86);
            transform: rotate(-4deg) translateY(1px);
        }

        .menu {
            position: absolute;
            left: 50%;
            top: 332px;
            width: 292px;
            transform: translateX(-50%);
            z-index: 5;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 58px;
            margin-bottom: 14px;
            border-radius: 18px;
            background: rgba(255, 249, 241, 0.68);
            backdrop-filter: blur(10px);
            box-shadow:
                0 12px 22px rgba(61, 22, 12, 0.1),
                inset 0 2px 0 rgba(255,255,255,0.28);
            color: rgba(83, 41, 29, 0.95);
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.12em;
        }

        .btn::before {
            content: "";
            position: absolute;
            left: 16px;
            top: 50%;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            transform: translateY(-50%);
            background: linear-gradient(180deg, #fff6e8, #e98958);
            box-shadow: 0 0 0 4px rgba(255, 243, 225, 0.24);
        }

        .btn.primary {
            background: linear-gradient(180deg, rgba(255, 249, 239, 0.94), rgba(255, 232, 198, 0.9));
        }

        .btn .small {
            margin-left: 10px;
            font-size: 13px;
            letter-spacing: 0.06em;
            font-weight: 700;
            color: rgba(109, 61, 44, 0.7);
        }

        .bottom {
            position: absolute;
            left: 50%;
            bottom: 32px;
            width: 760px;
            transform: translateX(-50%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(88, 45, 32, 0.7);
            font-size: 13px;
            font-weight: 700;
            z-index: 4;
        }

        .tip {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 248, 240, 0.34);
            backdrop-filter: blur(8px);
        }

        .version {
            letter-spacing: 0.12em;
        }
    </style>
</head>
<body>
    <main class="screen">
        <div class="ornament">
            <div class="ring left"></div>
            <div class="ring right"></div>
        </div>

        <div class="settings">⚙</div>

        <section class="center">
            <div class="eyebrow">MAIN MENU</div>
            <div class="plaque-wrap">
                <div class="plaque-shadow"></div>
                <div class="plaque">
                    <h1 class="title"><span class="cold">冷面</span><span class="warm">人生</span></h1>
                </div>
            </div>
            <div class="subtitle">
                一个人，一辆摊车，把冷脸活成热气腾腾的生活。
                <span class="brush">慢慢开张</span>
            </div>
        </section>

        <section class="menu">
            <div class="btn primary">开始游戏 <span class="small">从第一天开张</span></div>
            <div class="btn">继续游戏 <span class="small">回到已有存档</span></div>
            <div class="btn">设置</div>
            <div class="btn">退出游戏</div>
        </section>

        <section class="bottom">
            <div class="tip">完成第一关后解锁场景选择与经营准备阶段</div>
            <div class="version">VER 0.1 PROTOTYPE</div>
        </section>
    </main>
</body>
</html>
