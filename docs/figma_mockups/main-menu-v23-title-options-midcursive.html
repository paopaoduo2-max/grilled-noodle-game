<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烤冷面物语 行草过渡选型板 V23</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=Long+Cang&family=Zhi+Mang+Xing&family=ZCOOL+XiaoWei&display=swap");

        :root {
            --panel: #f6ebdc;
            --line: rgba(86, 47, 32, 0.12);
            --cold-1: #d8e5f4;
            --cold-2: #99b5d5;
            --warm-1: #ffe7be;
            --warm-2: #ffbf75;
            --warm-3: #de7548;
            --paper: #fff6ec;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 205, 142, 0.16), transparent 24%),
                linear-gradient(180deg, #2a1814 0%, #1c110e 100%);
        }

        .board {
            width: 1760px;
            margin: 0 auto;
            padding: 36px 36px 60px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
            color: #fff2df;
        }

        .topbar h1 {
            margin: 0;
            font-size: 34px;
            letter-spacing: 0.08em;
        }

        .topbar p {
            margin: 0;
            font-size: 13px;
            opacity: 0.82;
            letter-spacing: 0.08em;
        }

        .panel {
            border-radius: 28px;
            padding: 24px;
            background: var(--panel);
            box-shadow:
                0 28px 64px rgba(18, 7, 4, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.38);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .card {
            position: relative;
            min-height: 286px;
            padding: 18px 18px 20px;
            border-radius: 24px;
            border: 1px solid var(--line);
            background:
                radial-gradient(circle at 16% 18%, rgba(255,255,255,0.36), transparent 16%),
                radial-gradient(circle at 84% 18%, rgba(255,248,218,0.42), transparent 16%),
                linear-gradient(90deg,
                    var(--cold-1) 0%,
                    var(--cold-2) 28%,
                    #d7cdc5 45%,
                    #ecd4b2 55%,
                    var(--warm-1) 72%,
                    var(--warm-2) 88%,
                    var(--warm-3) 100%);
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.06)),
                linear-gradient(90deg, rgba(81, 109, 145, 0.11), transparent 35%, transparent 65%, rgba(219, 116, 71, 0.12));
            pointer-events: none;
        }

        .tag {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(83, 43, 30, 0.1);
            color: #4e2a1f;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .plaque-wrap {
            position: relative;
            width: 100%;
            max-width: 520px;
            margin: 14px auto 0;
        }

        .shadow {
            position: absolute;
            inset: 16px 18px -10px;
            border-radius: 30px;
            background: rgba(51, 20, 12, 0.2);
            filter: blur(14px);
            transform: translateY(14px);
        }

        .plaque {
            position: relative;
            padding: 20px 28px 22px;
            border-radius: 30px;
            background:
                linear-gradient(180deg, rgba(154, 101, 72, 0.98), rgba(116, 68, 51, 0.98) 42%, rgba(85, 47, 36, 0.98) 100%);
            border: 4px solid rgba(246, 223, 191, 0.76);
            box-shadow:
                inset 0 2px 0 rgba(255, 236, 209, 0.22),
                inset 0 -8px 16px rgba(44, 20, 13, 0.18),
                0 22px 44px rgba(38, 14, 8, 0.16);
            overflow: hidden;
            text-align: center;
        }

        .plaque::before {
            content: "";
            position: absolute;
            inset: 12px;
            border-radius: 18px;
            border: 2px solid rgba(255, 236, 209, 0.14);
        }

        .plaque::after {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.44;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.06), transparent 28%, transparent 76%, rgba(0,0,0,0.06)),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.018) 0 3px, rgba(0,0,0,0.016) 3px 6px);
        }

        .main-title,
        .sub-title,
        .divider {
            position: relative;
            z-index: 1;
        }

        .main-title {
            margin: 0;
            white-space: nowrap;
            color: var(--paper);
        }

        .main-title .cold { color: #eef7ff; }
        .main-title .warm { color: #fff0cf; }

        .divider {
            width: 240px;
            height: 12px;
            margin: 12px auto 8px;
            background: transparent;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 74px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 232, 205, 0.84));
            transform: translateY(-50%);
        }

        .divider::before { left: 8px; }
        .divider::after {
            right: 8px;
            transform: translateY(-50%) scaleX(-1);
        }

        .divider span {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffd9a6;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 4px rgba(255, 239, 214, 0.12);
        }

        .sub-title {
            margin: 0;
            color: rgba(255, 240, 221, 0.96);
            white-space: nowrap;
        }

        .style-s .main-title {
            font-family: "Zhi Mang Xing", cursive;
            font-size: 96px;
            letter-spacing: 0.03em;
            text-indent: 0.03em;
            text-shadow: 0 3px 0 rgba(255,255,255,0.12), 0 6px 0 rgba(112,60,44,0.32), 0 12px 24px rgba(60,25,14,0.14);
        }

        .style-s .sub-title {
            font-family: "Ma Shan Zheng", cursive;
            font-size: 30px;
            letter-spacing: 0.14em;
            text-indent: 0.14em;
        }

        .style-t .main-title {
            font-family: "Zhi Mang Xing", cursive;
            font-size: 98px;
            letter-spacing: 0.02em;
            text-indent: 0.02em;
            transform: rotate(-1.25deg);
            text-shadow:
                -1px 0 0 rgba(128,160,198,0.12),
                1px 0 0 rgba(226,129,78,0.12),
                0 6px 0 rgba(112,60,44,0.28),
                0 14px 26px rgba(60,25,14,0.14);
        }

        .style-t .sub-title {
            font-family: "ZCOOL XiaoWei", serif;
            font-size: 28px;
            letter-spacing: 0.22em;
            text-indent: 0.22em;
        }

        .style-u .main-title {
            font-family: "Ma Shan Zheng", cursive;
            font-size: 90px;
            letter-spacing: 0.05em;
            text-indent: 0.05em;
            text-shadow: 0 3px 0 rgba(255,255,255,0.12), 0 7px 0 rgba(112,60,44,0.32), 0 14px 26px rgba(60,25,14,0.14);
        }

        .style-u .sub-title {
            font-family: "Ma Shan Zheng", cursive;
            font-size: 28px;
            letter-spacing: 0.1em;
            text-indent: 0.1em;
        }

        .style-v .main-title {
            font-family: "Ma Shan Zheng", cursive;
            font-size: 98px;
            letter-spacing: 0.03em;
            text-indent: 0.03em;
            transform: skewX(-6deg);
            text-shadow:
                0 3px 0 rgba(255,255,255,0.12),
                0 8px 0 rgba(112,60,44,0.28),
                0 14px 28px rgba(60,25,14,0.14);
        }

        .style-v .sub-title {
            font-family: "Liu Jian Mao Cao", cursive;
            font-size: 30px;
            letter-spacing: 0.08em;
            text-indent: 0.08em;
        }

        .style-w .main-title {
            font-family: "Liu Jian Mao Cao", cursive;
            font-size: 94px;
            letter-spacing: 0.03em;
            text-indent: 0.03em;
            text-shadow: 0 3px 0 rgba(255,255,255,0.12), 0 6px 0 rgba(112,60,44,0.24), 0 12px 24px rgba(60,25,14,0.14);
        }

        .style-w .sub-title {
            font-family: "Zhi Mang Xing", cursive;
            font-size: 30px;
            letter-spacing: 0.12em;
            text-indent: 0.12em;
        }

        .style-x .main-title {
            font-family: "Long Cang", cursive;
            font-size: 110px;
            letter-spacing: 0.02em;
            text-indent: 0.02em;
            text-shadow: 0 3px 0 rgba(255,255,255,0.12), 0 6px 0 rgba(112,60,44,0.24), 0 12px 24px rgba(60,25,14,0.14);
        }

        .style-x .sub-title {
            font-family: "Ma Shan Zheng", cursive;
            font-size: 30px;
            letter-spacing: 0.12em;
            text-indent: 0.12em;
        }
    </style>
</head>
<body>
    <div class="board">
        <div class="topbar">
            <h1>烤冷面物语 行草过渡选型板 V23</h1>
            <p>介于标准行草和毛笔行草之间的一组。</p>
        </div>

        <section class="panel">
            <div class="grid">
                <div class="card">
                    <div class="tag">S / 稳行草</div>
                    <div class="plaque-wrap">
                        <div class="shadow"></div>
                        <div class="plaque style-s">
                            <h3 class="main-title"><span class="cold">烤冷面</span><span class="warm">物语</span></h3>
                            <div class="divider"><span></span></div>
                            <p class="sub-title">冷面人生</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="tag">T / 轻飞白行草</div>
                    <div class="plaque-wrap">
                        <div class="shadow"></div>
                        <div class="plaque style-t">
                            <h3 class="main-title"><span class="cold">烤冷面</span><span class="warm">物语</span></h3>
                            <div class="divider"><span></span></div>
                            <p class="sub-title">冷面人生</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="tag">U / 毛笔偏正</div>
                    <div class="plaque-wrap">
                        <div class="shadow"></div>
                        <div class="plaque style-u">
                            <h3 class="main-title"><span class="cold">烤冷面</span><span class="warm">物语</span></h3>
                            <div class="divider"><span></span></div>
                            <p class="sub-title">冷面人生</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="tag">V / 毛笔偏乱</div>
                    <div class="plaque-wrap">
                        <div class="shadow"></div>
                        <div class="plaque style-v">
                            <h3 class="main-title"><span class="cold">烤冷面</span><span class="warm">物语</span></h3>
                            <div class="divider"><span></span></div>
                            <p class="sub-title">冷面人生</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="tag">W / 草书过渡体</div>
                    <div class="plaque-wrap">
                        <div class="shadow"></div>
                        <div class="plaque style-w">
                            <h3 class="main-title"><span class="cold">烤冷面</span><span class="warm">物语</span></h3>
                            <div class="divider"><span></span></div>
                            <p class="sub-title">冷面人生</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="tag">X / 草招飞笔体</div>
                    <div class="plaque-wrap">
                        <div class="shadow"></div>
                        <div class="plaque style-x">
                            <h3 class="main-title"><span class="cold">烤冷面</span><span class="warm">物语</span></h3>
                            <div class="divider"><span></span></div>
                            <p class="sub-title">冷面人生</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
