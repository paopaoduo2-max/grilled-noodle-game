<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷面人生 - 精简首页稿 V4</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap");

        :root {
            --cold-1: #d8e6f5;
            --cold-2: #98b2cf;
            --warm-1: #ffe8bd;
            --warm-2: #ffbf76;
            --warm-3: #e67a4d;
            --paper: #fff4e6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 211, 144, 0.16), transparent 26%),
                linear-gradient(180deg, #281814 0%, #1e120f 100%);
        }

        .screen {
            position: relative;
            width: min(1280px, 100vw);
            height: min(720px, 100vh);
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 18%, rgba(255,255,255,0.42), transparent 18%),
                radial-gradient(circle at 82% 18%, rgba(255,248,218,0.46), transparent 18%),
                linear-gradient(90deg,
                    var(--cold-1) 0%,
                    var(--cold-2) 27%,
                    #d9cec6 45%,
                    #edd3b0 55%,
                    var(--warm-1) 73%,
                    var(--warm-2) 87%,
                    var(--warm-3) 100%);
        }

        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.05)),
                linear-gradient(90deg, rgba(81, 109, 145, 0.1), transparent 36%, transparent 64%, rgba(221, 111, 62, 0.1));
            pointer-events: none;
        }

        .screen::after {
            content: "";
            position: absolute;
            left: 50%;
            top: -14%;
            bottom: -14%;
            width: 170px;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(255,255,255,0.24), rgba(255,255,255,0.05) 42%, transparent 76%);
            filter: blur(18px);
            pointer-events: none;
        }

        .ring {
            position: absolute;
            border: 2px solid rgba(255, 250, 242, 0.16);
            border-radius: 999px;
            pointer-events: none;
        }

        .ring.left {
            left: 82px;
            top: 134px;
            width: 210px;
            height: 210px;
        }

        .ring.right {
            right: 82px;
            bottom: 94px;
            width: 244px;
            height: 244px;
        }

        .settings {
            position: absolute;
            top: 28px;
            right: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            height: 46px;
            padding: 0 16px 0 12px;
            border-radius: 999px;
            background: rgba(255, 249, 241, 0.64);
            backdrop-filter: blur(10px);
            box-shadow:
                0 12px 24px rgba(53, 19, 10, 0.1),
                inset 0 2px 0 rgba(255,255,255,0.26);
            color: rgba(84, 41, 29, 0.84);
            z-index: 5;
        }

        .settings-text {
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 0.12em;
        }

        .slider-icon {
            position: relative;
            width: 22px;
            height: 18px;
        }

        .slider-icon span {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            border-radius: 999px;
            background: rgba(84, 41, 29, 0.86);
        }

        .slider-icon span:nth-child(1) { top: 1px; }
        .slider-icon span:nth-child(2) { top: 8px; }
        .slider-icon span:nth-child(3) { top: 15px; }

        .slider-icon b {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: linear-gradient(180deg, #fff6e8, #ea8f5d);
            box-shadow: 0 0 0 2px rgba(255, 243, 225, 0.34);
        }

        .slider-icon b:nth-of-type(1) { left: 2px; top: -2px; }
        .slider-icon b:nth-of-type(2) { left: 12px; top: 5px; }
        .slider-icon b:nth-of-type(3) { left: 6px; top: 12px; }

        .center {
            position: absolute;
            left: 50%;
            top: 110px;
            width: 392px;
            transform: translateX(-50%);
            text-align: center;
            z-index: 4;
        }

        .plaque-wrap {
            position: relative;
            width: 392px;
            margin: 0 auto 22px;
        }

        .plaque-shadow {
            position: absolute;
            inset: 10px 12px -2px;
            border-radius: 24px;
            background: rgba(59, 28, 20, 0.18);
            filter: blur(10px);
            transform: translateY(10px);
        }

        .plaque {
            position: relative;
            padding: 18px 22px 20px;
            border-radius: 24px;
            background:
                linear-gradient(180deg, rgba(140, 88, 61, 0.96), rgba(101, 61, 44, 0.98) 56%, rgba(70, 40, 31, 0.98) 100%);
            border: 4px solid rgba(246, 223, 191, 0.72);
            box-shadow:
                inset 0 2px 0 rgba(255, 236, 209, 0.24),
                inset 0 -8px 16px rgba(44, 20, 13, 0.2),
                0 22px 48px rgba(38, 14, 8, 0.18);
            overflow: hidden;
        }

        .plaque::before {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 16px;
            border: 2px solid rgba(255, 236, 209, 0.14);
        }

        .title {
            position: relative;
            margin: 0;
            white-space: nowrap;
            font-family: "Noto Serif SC", serif;
            font-size: 68px;
            line-height: 1;
            letter-spacing: 0.1em;
            text-indent: 0.1em;
            color: var(--paper);
            text-shadow:
                -2px 0 0 rgba(122, 154, 193, 0.3),
                2px 0 0 rgba(223, 130, 77, 0.24),
                0 4px 0 rgba(63, 29, 20, 0.15),
                0 10px 16px rgba(34, 12, 8, 0.16);
            z-index: 1;
        }

        .title .cold {
            color: #edf7ff;
        }

        .title .warm {
            color: #fff1dd;
        }

        .menu {
            position: absolute;
            left: 50%;
            top: 326px;
            width: 286px;
            transform: translateX(-50%);
            z-index: 5;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 58px;
            margin-bottom: 16px;
            border-radius: 18px;
            background: rgba(255, 249, 241, 0.68);
            backdrop-filter: blur(10px);
            box-shadow:
                0 12px 22px rgba(61, 22, 12, 0.1),
                inset 0 2px 0 rgba(255,255,255,0.28);
            color: rgba(83, 41, 29, 0.95);
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.12em;
        }

        .btn::before {
            content: "";
            position: absolute;
            left: 16px;
            top: 50%;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            transform: translateY(-50%);
            background: linear-gradient(180deg, #fff6e8, #e98958);
            box-shadow: 0 0 0 4px rgba(255, 243, 225, 0.24);
        }

        .btn.primary {
            background: linear-gradient(180deg, rgba(255, 249, 239, 0.94), rgba(255, 232, 198, 0.9));
        }
    </style>
</head>
<body>
    <main class="screen">
        <div class="ring left"></div>
        <div class="ring right"></div>

        <div class="settings">
            <div class="slider-icon">
                <span></span><span></span><span></span>
                <b></b><b></b><b></b>
            </div>
            <div class="settings-text">设置</div>
        </div>

        <section class="center">
            <div class="plaque-wrap">
                <div class="plaque-shadow"></div>
                <div class="plaque">
                    <h1 class="title"><span class="cold">冷面</span><span class="warm">人生</span></h1>
                </div>
            </div>
        </section>

        <section class="menu">
            <div class="btn primary">开始游戏</div>
            <div class="btn">继续游戏</div>
            <div class="btn">退出游戏</div>
        </section>
    </main>
</body>
</html>
