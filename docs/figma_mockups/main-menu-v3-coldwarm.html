<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷面人生 - 首页概念稿</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        :root {
            --ink: #4b2018;
            --cream: #fff4e6;
            --soft-cream: #ffe7c5;
            --cold-1: #92a8c1;
            --cold-2: #5e6f88;
            --cold-3: #344354;
            --warm-1: #ffd579;
            --warm-2: #ff9f52;
            --warm-3: #ef6a3d;
            --menu: rgba(74, 33, 24, 0.82);
            --line: rgba(255, 240, 215, 0.22);
            --start: #ffcf57;
            --continue: #ffe6c0;
            --quit: rgba(255, 246, 230, 0.1);
            --shadow: 0 22px 60px rgba(29, 10, 6, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #1f1310;
            color: var(--cream);
        }

        .screen {
            position: relative;
            width: min(1280px, 100vw);
            height: min(720px, 100vh);
            overflow: hidden;
            background:
                linear-gradient(90deg, var(--cold-2) 0%, var(--cold-1) 42%, #ccb8a6 50%, var(--warm-1) 58%, var(--warm-2) 100%);
        }

        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.14)),
                radial-gradient(circle at 26% 20%, rgba(255,255,255,0.22), transparent 18%),
                radial-gradient(circle at 74% 16%, rgba(255,246,208,0.34), transparent 20%);
        }

        .divider {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 6px;
            transform: translateX(-50%);
            background: linear-gradient(180deg, rgba(75, 32, 24, 0.15), rgba(75, 32, 24, 0.6), rgba(75, 32, 24, 0.2));
            box-shadow: 0 0 24px rgba(75, 32, 24, 0.18);
        }

        .portrait {
            position: absolute;
            top: 66px;
            width: 456px;
            height: 590px;
            pointer-events: none;
        }

        .portrait.left {
            left: 30px;
        }

        .portrait.right {
            right: 30px;
        }

        .face {
            position: absolute;
            top: 58px;
            width: 360px;
            height: 450px;
            border-radius: 180px 180px 160px 160px;
            overflow: hidden;
            box-shadow: inset 0 0 0 4px rgba(75, 32, 24, 0.12);
        }

        .left .face {
            left: 52px;
            background:
                linear-gradient(180deg, #f7e0d4 0%, #d7b8ab 48%, #a8897f 100%);
            clip-path: polygon(0 0, 76% 0, 66% 100%, 0 100%);
        }

        .right .face {
            right: 52px;
            background:
                linear-gradient(180deg, #ffe2c9 0%, #ffc28d 50%, #f59f66 100%);
            clip-path: polygon(34% 0, 100% 0, 100% 100%, 24% 100%);
        }

        .hair {
            position: absolute;
            top: 8px;
            width: 380px;
            height: 210px;
            background: linear-gradient(180deg, #503329 0%, #312019 100%);
            border-radius: 200px 200px 100px 100px;
        }

        .left .hair {
            left: 38px;
            clip-path: polygon(0 0, 82% 0, 68% 100%, 0 100%);
        }

        .right .hair {
            right: 38px;
            clip-path: polygon(32% 0, 100% 0, 100% 100%, 18% 100%);
        }

        .eye,
        .brow,
        .mouth {
            position: absolute;
            background: #4c251b;
        }

        .left .brow {
            left: 196px;
            top: 232px;
            width: 72px;
            height: 6px;
            border-radius: 999px;
            transform: rotate(-4deg);
        }

        .left .eye {
            left: 208px;
            top: 258px;
            width: 48px;
            height: 6px;
            border-radius: 999px;
        }

        .left .mouth {
            left: 210px;
            top: 360px;
            width: 58px;
            height: 5px;
            border-radius: 999px;
        }

        .right .brow {
            right: 188px;
            top: 226px;
            width: 74px;
            height: 6px;
            border-radius: 999px;
            transform: rotate(4deg);
        }

        .right .eye {
            right: 198px;
            top: 252px;
            width: 50px;
            height: 8px;
            border-radius: 999px;
            transform: rotate(8deg);
        }

        .right .mouth {
            right: 188px;
            top: 354px;
            width: 70px;
            height: 24px;
            border-radius: 0 0 40px 40px;
            background: transparent;
            border-bottom: 6px solid #4c251b;
        }

        .tearline,
        .blush {
            position: absolute;
            border-radius: 999px;
            opacity: 0.55;
        }

        .left .tearline {
            left: 228px;
            top: 284px;
            width: 12px;
            height: 66px;
            background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.36), rgba(255,255,255,0));
        }

        .right .blush {
            right: 174px;
            top: 302px;
            width: 48px;
            height: 22px;
            background: rgba(255, 146, 126, 0.46);
        }

        .side-copy {
            position: absolute;
            bottom: 76px;
            width: 250px;
            padding: 16px 18px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.8;
            font-weight: 700;
            backdrop-filter: blur(6px);
        }

        .left .side-copy {
            left: 34px;
            color: #eef4fb;
            background: rgba(52, 67, 84, 0.26);
        }

        .right .side-copy {
            right: 34px;
            color: #6e301d;
            background: rgba(255, 244, 227, 0.42);
        }

        .menu {
            position: absolute;
            left: 50%;
            top: 132px;
            width: 372px;
            transform: translateX(-50%);
            padding: 26px 28px 24px;
            border: 1px solid var(--line);
            border-radius: 34px;
            background: linear-gradient(180deg, rgba(79, 35, 25, 0.76), rgba(61, 25, 18, 0.88));
            box-shadow: var(--shadow);
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 4;
        }

        .menu .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            border-radius: 999px;
            background: rgba(255, 246, 229, 0.1);
            border: 1px solid rgba(255,255,255,0.14);
            font-size: 14px;
            letter-spacing: 0.12em;
            color: var(--soft-cream);
        }

        .menu h1 {
            margin: 18px 0 8px;
            font-size: 64px;
            line-height: 1;
            letter-spacing: 0.12em;
            color: #fff2d9;
            text-shadow: 0 4px 14px rgba(25, 7, 4, 0.22);
        }

        .menu .sub {
            margin: 0 0 22px;
            font-size: 17px;
            line-height: 1.8;
            color: #f5dcc2;
        }

        .button {
            display: grid;
            place-items: center;
            width: 100%;
            height: 66px;
            margin-bottom: 14px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 0.08em;
            box-shadow: 0 14px 28px rgba(22, 7, 4, 0.16);
        }

        .button.start {
            background: linear-gradient(180deg, var(--start), #ff9a39);
            color: #5b2a1a;
        }

        .button.continue {
            background: linear-gradient(180deg, var(--continue), #f6d7aa);
            color: #5b2a1a;
        }

        .button.quit {
            background: var(--quit);
            border: 1px solid rgba(255,255,255,0.12);
            color: #f6dcc0;
        }

        .settings {
            position: absolute;
            top: 22px;
            right: 22px;
            width: 62px;
            height: 62px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255, 246, 230, 0.12);
            color: #fff0db;
            font-size: 28px;
            font-weight: 800;
        }

        .story-note {
            margin-top: 6px;
            padding: 14px 16px;
            border-radius: 20px;
            background: rgba(255, 246, 230, 0.08);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
            line-height: 1.8;
            color: #f6dcc0;
        }

        .footer {
            position: absolute;
            left: 50%;
            bottom: 28px;
            width: 610px;
            transform: translateX(-50%);
            padding: 14px 20px;
            border-radius: 999px;
            background: rgba(70, 31, 22, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            font-size: 14px;
            color: #f8e4cf;
            backdrop-filter: blur(8px);
            z-index: 4;
        }
    </style>
</head>
<body>
    <main class="screen">
        <div class="divider"></div>

        <section class="portrait left">
            <div class="hair"></div>
            <div class="face"></div>
            <div class="brow"></div>
            <div class="eye"></div>
            <div class="mouth"></div>
            <div class="tearline"></div>
            <div class="side-copy">
                表面的冷酷，是他长久以来不擅表达的壳。<br>
                他看起来没什么反应，却一直认真地做着每一份热面。
            </div>
        </section>

        <section class="portrait right">
            <div class="hair"></div>
            <div class="face"></div>
            <div class="brow"></div>
            <div class="eye"></div>
            <div class="mouth"></div>
            <div class="blush"></div>
            <div class="side-copy">
                内心真正的他，是被顾客、故事和烟火慢慢治愈的人。<br>
                每一次微笑，都像把热腾腾的冷面递给世界。
            </div>
        </section>

        <section class="menu">
            <div class="settings">⚙</div>
            <div class="badge">STORY MENU · COLD FACE / WARM HEART</div>
            <h1>冷面人生</h1>
            <p class="sub">一个面瘫青年经营烤冷面摊的治愈故事。<br>从第一天开张开始，慢慢学会和世界相处。</p>

            <div class="button start">开始游戏</div>
            <div class="button continue">继续游戏</div>
            <div class="button quit">退出游戏</div>

            <div class="story-note">
                首页只保留故事入口。<br>
                新游戏先进入第一关；通关后再解锁后续场景与准备阶段。
            </div>
        </section>

        <div class="footer">
            视觉方向：中线分割的双面表情背景，左侧是面瘫外壳，右侧是被治愈后的内心温度。
        </div>
    </main>
</body>
</html>
