<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷面人生 - 中文艺术字方案</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Liu+Jian+Mao+Cao&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap");

        :root {
            --cold-1: #d7e5f2;
            --cold-2: #90a9c3;
            --cold-3: #556f8d;
            --warm-1: #ffe3a8;
            --warm-2: #ffb260;
            --warm-3: #ef6c40;
            --ink: #5a261a;
            --ink-soft: rgba(90, 38, 26, 0.74);
            --paper: rgba(255, 248, 237, 0.7);
            --paper-strong: rgba(255, 249, 241, 0.85);
            --shadow: 0 18px 48px rgba(43, 15, 10, 0.16);
            --menu-shadow: 0 24px 54px rgba(35, 11, 7, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #221512;
        }

        .screen {
            position: relative;
            width: min(1280px, 100vw);
            height: min(720px, 100vh);
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 18%, rgba(255,255,255,0.42), transparent 18%),
                radial-gradient(circle at 80% 18%, rgba(255,248,215,0.48), transparent 18%),
                linear-gradient(90deg, var(--cold-1) 0%, var(--cold-2) 26%, #d5c8c2 45%, #e6c4a2 55%, var(--warm-1) 72%, var(--warm-2) 86%, var(--warm-3) 100%);
        }

        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.05)),
                linear-gradient(90deg, rgba(68,92,121,0.14), transparent 35%, transparent 65%, rgba(223,111,58,0.14));
        }

        .screen::after {
            content: "";
            position: absolute;
            left: 50%;
            top: -8%;
            bottom: -8%;
            width: 230px;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(255,255,255,0.28), rgba(255,255,255,0.08) 44%, transparent 78%);
            filter: blur(22px);
        }

        .top-note {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255, 250, 242, 0.54);
            backdrop-filter: blur(8px);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.22em;
            color: rgba(85, 39, 28, 0.76);
        }

        .art-grid {
            position: absolute;
            left: 54px;
            right: 54px;
            top: 76px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            z-index: 3;
        }

        .art-card {
            position: relative;
            min-height: 252px;
            padding: 18px 18px 16px;
            border-radius: 28px;
            background: var(--paper);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .art-card .label {
            position: relative;
            z-index: 2;
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--paper-strong);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.18em;
            color: rgba(89, 42, 29, 0.74);
        }

        .art-card .hint {
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 16px;
            z-index: 2;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.7;
            color: rgba(87, 41, 28, 0.7);
        }

        .ink-splash,
        .warm-splash {
            position: absolute;
            border-radius: 50%;
            filter: blur(1px);
        }

        .ink-splash {
            background: rgba(77, 39, 30, 0.12);
        }

        .warm-splash {
            background: rgba(255, 193, 118, 0.24);
        }

        .art-a .ink-splash.a1 { width: 130px; height: 90px; left: 34px; top: 72px; }
        .art-a .ink-splash.a2 { width: 110px; height: 80px; right: 42px; top: 86px; }
        .art-a .warm-splash.a3 { width: 160px; height: 120px; left: 126px; top: 52px; }

        .title-a {
            position: absolute;
            inset: 64px 10px auto;
            z-index: 2;
            text-align: center;
            font-family: "Ma Shan Zheng", cursive;
            font-size: 76px;
            line-height: 1;
            letter-spacing: 0.02em;
            color: #fff3dc;
            text-shadow:
                0 3px 0 rgba(86, 40, 29, 0.14),
                0 16px 24px rgba(86, 40, 29, 0.14);
        }

        .title-a .cold {
            color: #eef7ff;
            -webkit-text-stroke: 3px rgba(75, 97, 124, 0.62);
            paint-order: stroke fill;
            margin-right: 6px;
        }

        .title-a .warm {
            color: #fff1dc;
            -webkit-text-stroke: 3px rgba(140, 60, 36, 0.58);
            paint-order: stroke fill;
            margin-left: 6px;
        }

        .title-a .seal {
            position: absolute;
            right: 42px;
            top: 74px;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(214, 78, 55, 0.88);
            color: #fff1e2;
            font-family: "ZCOOL XiaoWei", serif;
            font-size: 18px;
            display: grid;
            place-items: center;
            transform: rotate(10deg);
        }

        .art-b {
            background:
                linear-gradient(135deg, rgba(244,249,255,0.82), rgba(255,240,211,0.74)),
                var(--paper);
        }

        .plaque {
            position: absolute;
            left: 44px;
            right: 44px;
            top: 58px;
            height: 138px;
            border-radius: 28px;
            background: linear-gradient(180deg, #7a3422, #5d2619);
            box-shadow: inset 0 0 0 4px rgba(255, 214, 163, 0.16), 0 14px 22px rgba(76, 32, 22, 0.18);
        }

        .plaque::before {
            content: "";
            position: absolute;
            inset: 12px;
            border: 2px solid rgba(255, 214, 163, 0.18);
            border-radius: 20px;
        }

        .title-b {
            position: absolute;
            inset: 74px 0 auto;
            z-index: 2;
            text-align: center;
            font-family: "ZCOOL XiaoWei", serif;
            font-size: 72px;
            line-height: 1;
            letter-spacing: 0.16em;
            color: #fff2d7;
            text-shadow: 0 4px 0 rgba(53, 18, 12, 0.26);
        }

        .title-b span {
            display: inline-block;
            margin: 0 2px;
        }

        .title-b .tilt1 { transform: translateY(-2px) rotate(-4deg); }
        .title-b .tilt2 { transform: translateY(4px) rotate(3deg); }
        .title-b .tilt3 { transform: translateY(-1px) rotate(-2deg); }
        .title-b .tilt4 { transform: translateY(3px) rotate(4deg); }

        .art-b .stamp {
            position: absolute;
            left: 58px;
            bottom: 54px;
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: rgba(212, 83, 60, 0.9);
            color: #fff3e4;
            display: grid;
            place-items: center;
            font-family: "ZCOOL XiaoWei", serif;
            font-size: 22px;
            transform: rotate(-7deg);
            box-shadow: 0 10px 18px rgba(92, 36, 24, 0.18);
        }

        .art-b .bar {
            position: absolute;
            left: 144px;
            right: 46px;
            bottom: 70px;
            height: 10px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(94, 121, 153, 0.72), rgba(255, 214, 136, 0.8), rgba(228, 108, 61, 0.72));
        }

        .art-c .warm-splash.c1 { width: 180px; height: 120px; left: 88px; top: 46px; }
        .art-c .ink-splash.c2 { width: 120px; height: 90px; left: 50px; top: 78px; }
        .art-c .ink-splash.c3 { width: 100px; height: 70px; right: 62px; top: 104px; }

        .title-c {
            position: absolute;
            left: 50%;
            top: 66px;
            transform: translateX(-50%);
            z-index: 2;
            font-family: "Liu Jian Mao Cao", cursive;
            font-size: 96px;
            line-height: 1;
            letter-spacing: 0.02em;
            color: rgba(255, 244, 221, 0.98);
            text-shadow:
                0 4px 0 rgba(88, 40, 29, 0.16),
                0 18px 26px rgba(88, 40, 29, 0.14);
            white-space: nowrap;
        }

        .title-c .cold {
            color: #f0f7ff;
            filter: drop-shadow(0 0 8px rgba(113, 151, 191, 0.18));
        }

        .title-c .warm {
            color: #fff0d8;
            filter: drop-shadow(0 0 8px rgba(244, 137, 72, 0.18));
        }

        .title-c .slash {
            position: absolute;
            left: 50%;
            top: 64px;
            width: 160px;
            height: 16px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(105,137,174,0.78), rgba(255,232,182,0.84), rgba(237,113,66,0.78));
            transform: translateX(-50%) rotate(-12deg);
            opacity: 0.88;
        }

        .menu {
            position: absolute;
            left: 50%;
            top: 404px;
            width: 320px;
            transform: translateX(-50%);
            z-index: 4;
            text-align: center;
        }

        .settings {
            position: absolute;
            top: 10px;
            right: -82px;
            width: 52px;
            height: 52px;
            display: grid;
            place-items: center;
            border-radius: 16px;
            background: rgba(255, 250, 242, 0.68);
            backdrop-filter: blur(8px);
            box-shadow: var(--menu-shadow);
            color: rgba(91, 42, 29, 0.9);
            font-size: 25px;
            font-weight: 900;
        }

        .button {
            display: grid;
            place-items: center;
            width: 100%;
            margin-bottom: 16px;
            border-radius: 999px;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 0.12em;
            box-shadow: var(--menu-shadow);
            backdrop-filter: blur(8px);
        }

        .button.start {
            height: 72px;
            background: linear-gradient(180deg, rgba(255, 216, 90, 0.98), rgba(255, 156, 60, 0.98));
            color: #6b311d;
        }

        .button.continue {
            height: 62px;
            background: rgba(255, 248, 236, 0.86);
            color: #67301f;
        }

        .button.quit {
            height: 56px;
            background: rgba(84, 52, 44, 0.22);
            border: 1px solid rgba(255,255,255,0.14);
            color: #fff4e3;
        }
    </style>
</head>
<body>
    <main class="screen">
        <div class="top-note">中文艺术字重做</div>

        <section class="art-grid">
            <article class="art-card art-a">
                <div class="label">毛笔招牌体</div>
                <div class="ink-splash a1"></div>
                <div class="ink-splash a2"></div>
                <div class="warm-splash a3"></div>
                <div class="title-a">
                    <span class="cold">冷面</span><span class="warm">人生</span>
                    <span class="seal">暖</span>
                </div>
                <div class="hint">偏故事感，适合“外冷内暖”的题名气质。</div>
            </article>

            <article class="art-card art-b">
                <div class="label">匾额题字体</div>
                <div class="plaque"></div>
                <div class="title-b">
                    <span class="tilt1">冷</span><span class="tilt2">面</span><span class="tilt3">人</span><span class="tilt4">生</span>
                </div>
                <div class="stamp">人</div>
                <div class="bar"></div>
                <div class="hint">更像摊位匾额，厚重、稳、店招感强。</div>
            </article>

            <article class="art-card art-c">
                <div class="label">剧情手写体</div>
                <div class="warm-splash c1"></div>
                <div class="ink-splash c2"></div>
                <div class="ink-splash c3"></div>
                <div class="title-c">
                    <span class="cold">冷面</span><span class="warm">人生</span>
                    <div class="slash"></div>
                </div>
                <div class="hint">更抒情，适合偏剧情、偏治愈的首页语气。</div>
            </article>
        </section>

        <section class="menu">
            <div class="settings">⚙</div>
            <div class="button start">开始游戏</div>
            <div class="button continue">继续游戏</div>
            <div class="button quit">退出游戏</div>
        </section>
    </main>
</body>
</html>
