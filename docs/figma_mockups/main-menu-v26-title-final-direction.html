<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烤冷面物语 标题定向稿 V26</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap");

        :root {
            --ink: #4e2c21;
            --wood-1: #9c694b;
            --wood-2: #78483a;
            --wood-3: #573026;
            --paper: #fff4e8;
            --paper-2: #ffe7ca;
            --cold-1: #e6f1fb;
            --cold-2: #b6cde6;
            --cold-3: #7fa0c3;
            --warm-1: #ffefd1;
            --warm-2: #ffc887;
            --warm-3: #df7d4f;
            --board: #f6ebdc;
            --line: rgba(86, 47, 32, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top, rgba(255, 205, 142, 0.14), transparent 24%),
                linear-gradient(180deg, #2a1814 0%, #1c110e 100%);
        }

        .board {
            width: 1600px;
            margin: 0 auto;
            padding: 36px 36px 60px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
            color: #fff2df;
        }

        .topbar h1 {
            margin: 0;
            font-size: 34px;
            letter-spacing: 0.08em;
        }

        .topbar p {
            margin: 0;
            font-size: 13px;
            opacity: 0.82;
            letter-spacing: 0.08em;
        }

        .panel {
            border-radius: 28px;
            padding: 24px;
            background: var(--board);
            box-shadow:
                0 28px 64px rgba(18, 7, 4, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.38);
        }

        .stage {
            position: relative;
            min-height: 640px;
            border-radius: 28px;
            overflow: hidden;
            background:
                linear-gradient(90deg,
                    #d9e7f6 0%,
                    #a4bfdc 28%,
                    #d6cbc2 46%,
                    #edd5b3 56%,
                    #ffdcae 76%,
                    #eba36d 90%,
                    #d56a46 100%);
            border: 1px solid var(--line);
        }

        .stage::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.06)),
                linear-gradient(90deg, rgba(81, 109, 145, 0.11), transparent 35%, transparent 65%, rgba(219, 116, 71, 0.12));
        }

        .stage::after {
            content: "";
            position: absolute;
            left: 50%;
            top: -12%;
            bottom: -12%;
            width: 170px;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(255,255,255,0.24), rgba(255,255,255,0.04) 44%, transparent 76%);
            filter: blur(22px);
        }

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            padding-top: 82px;
            text-align: center;
        }

        .plaque-wrap {
            position: relative;
            width: 620px;
            margin: 0 auto;
        }

        .plaque-shadow {
            position: absolute;
            inset: 16px 18px -10px;
            border-radius: 34px;
            background: rgba(51, 20, 12, 0.18);
            filter: blur(16px);
            transform: translateY(14px);
        }

        .plaque {
            position: relative;
            padding: 24px 24px 24px;
            border-radius: 34px;
            background:
                linear-gradient(180deg, rgba(156, 105, 75, 0.98), rgba(120, 72, 58, 0.98) 42%, rgba(87, 48, 38, 0.98) 100%);
            border: 4px solid rgba(246, 223, 191, 0.76);
            box-shadow:
                inset 0 2px 0 rgba(255, 236, 209, 0.22),
                inset 0 -8px 16px rgba(44, 20, 13, 0.18),
                0 22px 44px rgba(38, 14, 8, 0.16);
            overflow: hidden;
        }

        .plaque::before {
            content: "";
            position: absolute;
            inset: 12px;
            border-radius: 20px;
            border: 2px solid rgba(255, 236, 209, 0.14);
        }

        .plaque::after {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.42;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.06), transparent 28%, transparent 76%, rgba(0,0,0,0.06)),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.018) 0 3px, rgba(0,0,0,0.016) 3px 6px);
        }

        .main-title,
        .sub-title,
        .divider {
            position: relative;
            z-index: 2;
        }

        .main-title {
            margin: 0;
            white-space: nowrap;
            font-family: "Zhi Mang Xing", cursive;
            font-size: 92px;
            line-height: 1;
            letter-spacing: 0.025em;
            text-indent: 0.025em;
            color: #fff0d8;
            -webkit-text-fill-color: #fff0d8;
            text-shadow:
                -1px 0 0 rgba(94, 50, 35, 0.32),
                1px 0 0 rgba(94, 50, 35, 0.32),
                0 -1px 0 rgba(94, 50, 35, 0.32),
                0 1px 0 rgba(94, 50, 35, 0.32),
                -1px -1px 0 rgba(94, 50, 35, 0.24),
                1px -1px 0 rgba(94, 50, 35, 0.24),
                -1px 1px 0 rgba(94, 50, 35, 0.24),
                1px 1px 0 rgba(94, 50, 35, 0.24),
                0 2px 0 rgba(255,255,255,0.18),
                0 5px 0 rgba(111,58,41,0.2),
                0 10px 18px rgba(60,25,14,0.1);
            transform: rotate(-0.8deg);
        }

        .main-title .char {
            position: relative;
            display: inline-block;
            color: inherit;
            -webkit-text-fill-color: inherit;
            transform: scale(1.04, 1.08);
            transform-origin: center bottom;
        }

        .main-title .char-accent::after {
            content: "";
            position: absolute;
            right: 2px;
            top: 18px;
            width: 18px;
            height: 10px;
            border-top: 2px solid rgba(255, 225, 178, 0.5);
            border-radius: 50%;
            transform: rotate(18deg);
            opacity: 0.7;
        }

        .divider {
            width: 228px;
            height: 12px;
            margin: 12px auto 10px;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 74px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 232, 205, 0.84));
            transform: translateY(-50%);
        }

        .divider::before { left: 8px; }

        .divider::after {
            right: 8px;
            transform: translateY(-50%) scaleX(-1);
        }

        .divider span {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffd9a6;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 4px rgba(255, 239, 214, 0.12);
        }

        .sub-title {
            margin: 0;
            white-space: nowrap;
            font-family: "Ma Shan Zheng", cursive;
            font-size: 34px;
            letter-spacing: 0.12em;
            text-indent: 0.12em;
            text-shadow: 0 2px 0 rgba(95, 52, 38, 0.24);
        }

        .sub-title .cold {
            color: #dceeff;
        }

        .sub-title .warm {
            color: #ffe1b6;
        }

        .notes {
            width: 740px;
            margin: 34px auto 0;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .note {
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(255,255,255,0.18);
            color: rgba(78, 44, 33, 0.92);
            font-size: 13px;
            line-height: 1.7;
            text-align: left;
        }

        .note strong {
            display: block;
            margin-bottom: 6px;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <div class="board">
        <div class="topbar">
            <h1>标题定向稿 V26</h1>
            <p>主标题统一缓渐变，副标题承担冷暖叙事</p>
        </div>

        <div class="panel">
            <div class="stage">
                <div class="content">
                    <div class="plaque-wrap">
                        <div class="plaque-shadow"></div>
                        <div class="plaque">
                            <h2 class="main-title">
                                <span class="char">烤</span>
                                <span class="char">冷</span>
                                <span class="char">面</span>
                                <span class="char">物</span>
                                <span class="char char-accent">语</span>
                            </h2>
                            <div class="divider"><span></span></div>
                            <p class="sub-title">
                                <span class="cold">冷面</span><span class="warm">人生</span>
                            </p>
                        </div>
                    </div>

                    <div class="notes">
                        <div class="note">
                            <strong>主标题颜色</strong>
                            `烤冷面物语` 整体只用一套从冷到暖的缓渐变，不再按词硬切颜色，所以整体会更统一。
                        </div>
                        <div class="note">
                            <strong>副标题分工</strong>
                            `冷面人生` 负责叙事，`冷面` 偏冷，`人生` 偏暖，让冷暖主题集中在副标题表达。
                        </div>
                        <div class="note">
                            <strong>可直接做成组件</strong>
                            这版只用标准行草体、描边阴影、轻微冷光和收笔装饰，Figma 能稳定实现并拆层导出。
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
