<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷面人生 - 艺术字方案</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        :root {
            --cold-1: #d9e6f0;
            --cold-2: #8da7c2;
            --cold-3: #5f7897;
            --warm-1: #ffe1a8;
            --warm-2: #ffb565;
            --warm-3: #f06e42;
            --ink: #5a251a;
            --paper: rgba(255, 248, 238, 0.68);
            --paper-strong: rgba(255, 250, 242, 0.82);
            --glow: rgba(255, 248, 224, 0.45);
            --shadow: 0 20px 46px rgba(43, 15, 9, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #231613;
        }

        .screen {
            position: relative;
            width: min(1280px, 100vw);
            height: min(720px, 100vh);
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 20%, rgba(255,255,255,0.4), transparent 18%),
                radial-gradient(circle at 78% 18%, rgba(255,248,214,0.46), transparent 18%),
                linear-gradient(90deg, var(--cold-1) 0%, var(--cold-2) 28%, #d8c9c2 46%, #e8c7a5 55%, var(--warm-1) 72%, var(--warm-2) 86%, var(--warm-3) 100%);
        }

        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.1), rgba(0,0,0,0.06)),
                linear-gradient(90deg, rgba(72,94,120,0.14), transparent 34%, transparent 66%, rgba(214,104,58,0.15));
        }

        .screen::after {
            content: "";
            position: absolute;
            left: 50%;
            top: -10%;
            bottom: -10%;
            width: 260px;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(255,255,255,0.3), rgba(255,255,255,0.08) 40%, transparent 76%);
            filter: blur(22px);
        }

        .top-label {
            position: absolute;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255, 249, 241, 0.52);
            backdrop-filter: blur(10px);
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.24em;
            color: rgba(86, 41, 29, 0.82);
        }

        .title-grid {
            position: absolute;
            left: 54px;
            right: 54px;
            top: 86px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            z-index: 3;
        }

        .title-card {
            min-height: 236px;
            padding: 22px 22px 20px;
            border-radius: 28px;
            background: var(--paper);
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
        }

        .title-card .tag {
            display: inline-block;
            margin-bottom: 16px;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--paper-strong);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.18em;
            color: rgba(91, 40, 27, 0.76);
        }

        .title-v1,
        .title-v2,
        .title-v3 {
            height: 132px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff3dc;
        }

        .title-v1 {
            gap: 4px;
        }

        .title-v1 span {
            font-size: 78px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0.06em;
            text-shadow: 0 4px 0 rgba(83, 38, 28, 0.18), 0 14px 18px rgba(73, 27, 18, 0.12);
        }

        .title-v1 .cold {
            color: #eef7ff;
            -webkit-text-stroke: 5px rgba(71, 92, 121, 0.64);
            paint-order: stroke fill;
        }

        .title-v1 .warm {
            color: #fff0da;
            -webkit-text-stroke: 5px rgba(130, 57, 35, 0.58);
            paint-order: stroke fill;
        }

        .title-v1 .cut {
            width: 30px;
            height: 10px;
            margin: 0 10px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(93,124,162,0.78), rgba(255,222,154,0.84), rgba(234,108,59,0.78));
            box-shadow: 0 0 16px rgba(255,255,255,0.35);
        }

        .title-v2 {
            gap: 8px;
        }

        .title-v2 .block {
            width: 86px;
            height: 106px;
            display: grid;
            place-items: center;
            border-radius: 24px;
            font-size: 58px;
            font-weight: 900;
            line-height: 1;
            box-shadow: 0 12px 26px rgba(63, 22, 13, 0.18);
        }

        .title-v2 .block.c1,
        .title-v2 .block.c2 {
            background: linear-gradient(180deg, rgba(234,244,255,0.92), rgba(179,204,228,0.94));
            color: #5a6e87;
            transform: rotate(-4deg);
        }

        .title-v2 .block.c3,
        .title-v2 .block.c4 {
            background: linear-gradient(180deg, rgba(255,239,206,0.96), rgba(255,164,95,0.94));
            color: #8c4327;
            transform: rotate(4deg);
        }

        .title-v3 {
            gap: 0;
            position: relative;
        }

        .title-v3 .shadow-word,
        .title-v3 .main-word {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-weight: 900;
            letter-spacing: 0.14em;
        }

        .title-v3 .shadow-word {
            top: 40px;
            font-size: 86px;
            color: rgba(92, 42, 28, 0.24);
            transform: translateX(-50%) translateY(8px) skewX(-8deg);
        }

        .title-v3 .main-word {
            top: 36px;
            font-size: 82px;
            transform: translateX(-50%) skewX(-8deg);
            background: linear-gradient(90deg, #ecf7ff 0%, #d6e3ef 34%, #fff4df 54%, #ffd18d 82%, #ffb16b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-stroke: 3px rgba(95, 54, 39, 0.48);
        }

        .subline {
            margin-top: 4px;
            text-align: center;
            font-size: 14px;
            line-height: 1.8;
            color: rgba(89, 45, 31, 0.74);
            font-weight: 700;
        }

        .menu {
            position: absolute;
            left: 50%;
            top: 400px;
            width: 320px;
            transform: translateX(-50%);
            z-index: 4;
            text-align: center;
        }

        .settings {
            position: absolute;
            top: -8px;
            right: -74px;
            width: 54px;
            height: 54px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            background: rgba(255, 250, 243, 0.62);
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
            color: rgba(91, 43, 30, 0.88);
            font-size: 26px;
            font-weight: 900;
        }

        .button {
            display: grid;
            place-items: center;
            width: 100%;
            margin-bottom: 16px;
            border-radius: 999px;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 0.12em;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
        }

        .button.start {
            height: 72px;
            background: linear-gradient(180deg, rgba(255, 215, 89, 0.98), rgba(255, 156, 61, 0.98));
            color: #6c311d;
        }

        .button.continue {
            height: 62px;
            background: rgba(255, 248, 236, 0.84);
            color: #65301f;
        }

        .button.quit {
            height: 56px;
            background: rgba(84, 50, 43, 0.22);
            color: #fff4e4;
            border: 1px solid rgba(255,255,255,0.16);
        }

        .bottom-note {
            position: absolute;
            left: 50%;
            bottom: 34px;
            transform: translateX(-50%);
            z-index: 4;
            padding: 14px 22px;
            border-radius: 999px;
            background: rgba(255, 249, 241, 0.42);
            backdrop-filter: blur(8px);
            font-size: 14px;
            font-weight: 700;
            color: rgba(89, 44, 31, 0.8);
        }
    </style>
</head>
<body>
    <main class="screen">
        <div class="top-label">ART TITLE OPTIONS</div>

        <section class="title-grid">
            <article class="title-card">
                <div class="tag">方案 A</div>
                <div class="title-v1">
                    <span class="cold">冷</span>
                    <span class="cold">面</span>
                    <span class="cut"></span>
                    <span class="warm">人</span>
                    <span class="warm">生</span>
                </div>
                <div class="subline">冷暖分字，偏叙事，适合当前世界观。</div>
            </article>

            <article class="title-card">
                <div class="tag">方案 B</div>
                <div class="title-v2">
                    <div class="block c1">冷</div>
                    <div class="block c2">面</div>
                    <div class="block c3">人</div>
                    <div class="block c4">生</div>
                </div>
                <div class="subline">更像招牌拼贴，记忆点强，情绪更鲜明。</div>
            </article>

            <article class="title-card">
                <div class="tag">方案 C</div>
                <div class="title-v3">
                    <div class="shadow-word">冷面人生</div>
                    <div class="main-word">冷面人生</div>
                </div>
                <div class="subline">整词艺术字，更成熟，适合偏剧情向首页。</div>
            </article>
        </section>

        <section class="menu">
            <div class="settings">⚙</div>
            <div class="button start">开始游戏</div>
            <div class="button continue">继续游戏</div>
            <div class="button quit">退出游戏</div>
        </section>

        <div class="bottom-note">主菜单只保留按钮居中，设置图标改为贴着按钮组上缘的独立浮钮。</div>
    </main>
</body>
</html>
