<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷面人生 - 店招牌匾首页稿</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@700;900&display=swap");

        :root {
            --bg: #1f120e;
            --cold-1: #d8e7f6;
            --cold-2: #9bb5d1;
            --cold-3: #5f7c9d;
            --warm-1: #ffe8bc;
            --warm-2: #ffbe73;
            --warm-3: #e6794d;
            --wood-1: #74452f;
            --wood-2: #5b3426;
            --wood-3: #3b2018;
            --ink: #4c261b;
            --paper: #fff4e6;
            --shadow: 0 24px 60px rgba(38, 14, 8, 0.22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 208, 136, 0.18), transparent 28%),
                linear-gradient(180deg, #281814 0%, var(--bg) 100%);
        }

        .screen {
            position: relative;
            width: min(1280px, 100vw);
            height: min(720px, 100vh);
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 16%, rgba(255,255,255,0.44), transparent 18%),
                radial-gradient(circle at 82% 16%, rgba(255,248,216,0.48), transparent 18%),
                linear-gradient(90deg,
                    var(--cold-1) 0%,
                    var(--cold-2) 27%,
                    #d9cec7 45%,
                    #edd3b0 55%,
                    var(--warm-1) 73%,
                    var(--warm-2) 87%,
                    var(--warm-3) 100%);
        }

        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.1), rgba(0,0,0,0.06)),
                linear-gradient(90deg, rgba(81, 109, 145, 0.12), transparent 34%, transparent 66%, rgba(221, 111, 62, 0.12));
            pointer-events: none;
        }

        .screen::after {
            content: "";
            position: absolute;
            left: 50%;
            top: -10%;
            bottom: -10%;
            width: 240px;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(255,255,255,0.34), rgba(255,255,255,0.08) 44%, transparent 76%);
            filter: blur(18px);
            pointer-events: none;
        }

        .bg-ornament {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .ring {
            position: absolute;
            border: 2px solid rgba(255, 251, 242, 0.22);
            border-radius: 999px;
        }

        .ring.left {
            left: 76px;
            top: 112px;
            width: 240px;
            height: 240px;
        }

        .ring.right {
            right: 76px;
            bottom: 86px;
            width: 290px;
            height: 290px;
        }

        .arc {
            position: absolute;
            width: 220px;
            height: 220px;
            border: 10px solid transparent;
            border-top-color: rgba(255, 249, 239, 0.18);
            border-radius: 999px;
            transform: rotate(18deg);
        }

        .arc.left {
            left: 132px;
            bottom: 94px;
        }

        .arc.right {
            right: 154px;
            top: 94px;
            transform: rotate(198deg);
        }

        .settings {
            position: absolute;
            top: 34px;
            right: 36px;
            width: 54px;
            height: 54px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            background: rgba(255, 248, 240, 0.66);
            backdrop-filter: blur(10px);
            box-shadow: 0 14px 28px rgba(53, 19, 10, 0.12);
            color: rgba(90, 45, 31, 0.86);
            font-size: 24px;
            font-weight: 900;
            z-index: 5;
        }

        .header {
            position: absolute;
            left: 50%;
            top: 74px;
            transform: translateX(-50%);
            width: 840px;
            text-align: center;
            z-index: 4;
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 18px;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(255, 248, 240, 0.42);
            backdrop-filter: blur(8px);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.22em;
            color: rgba(90, 45, 31, 0.72);
        }

        .plaque-wrap {
            position: relative;
            width: 640px;
            margin: 0 auto;
            padding: 18px 20px 22px;
        }

        .plaque-shadow {
            position: absolute;
            inset: 12px 18px 0;
            border-radius: 28px;
            background: rgba(60, 29, 20, 0.18);
            filter: blur(10px);
            transform: translateY(14px);
        }

        .plaque {
            position: relative;
            padding: 28px 34px 30px;
            border-radius: 28px;
            background:
                linear-gradient(180deg, rgba(142, 89, 62, 0.96), rgba(104, 62, 44, 0.98) 54%, rgba(71, 40, 30, 0.98) 100%);
            border: 4px solid rgba(247, 224, 190, 0.76);
            box-shadow:
                inset 0 2px 0 rgba(255, 236, 209, 0.28),
                inset 0 -8px 16px rgba(44, 20, 13, 0.24),
                var(--shadow);
            overflow: hidden;
        }

        .plaque::before {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 20px;
            border: 2px solid rgba(255, 236, 209, 0.16);
        }

        .plaque::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(255,255,255,0.06), transparent 18%, transparent 78%, rgba(0,0,0,0.08)),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0 2px, rgba(0,0,0,0.02) 2px 4px);
            opacity: 0.56;
            pointer-events: none;
        }

        .title {
            position: relative;
            margin: 0;
            font-family: "Noto Serif SC", serif;
            font-size: 120px;
            line-height: 1;
            letter-spacing: 0.2em;
            text-indent: 0.2em;
            color: var(--paper);
            text-shadow:
                -3px 0 0 rgba(122, 154, 193, 0.44),
                3px 0 0 rgba(223, 130, 77, 0.36),
                0 5px 0 rgba(63, 29, 20, 0.18),
                0 16px 26px rgba(34, 12, 8, 0.22);
            z-index: 1;
        }

        .title .cold {
            color: #edf7ff;
        }

        .title .warm {
            color: #fff1dd;
        }

        .subtitle {
            position: relative;
            margin: 20px auto 0;
            max-width: 720px;
            font-size: 21px;
            line-height: 1.9;
            font-weight: 700;
            color: rgba(92, 46, 32, 0.92);
        }

        .subtitle .brush {
            display: inline-block;
            margin-left: 8px;
            font-family: "Ma Shan Zheng", cursive;
            font-size: 28px;
            color: rgba(126, 60, 37, 0.9);
            transform: rotate(-4deg) translateY(2px);
        }

        .menu {
            position: absolute;
            left: 50%;
            top: 376px;
            width: 360px;
            transform: translateX(-50%);
            z-index: 5;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 68px;
            margin-bottom: 18px;
            border-radius: 22px;
            background: rgba(255, 249, 241, 0.72);
            backdrop-filter: blur(10px);
            box-shadow:
                0 14px 26px rgba(61, 22, 12, 0.12),
                inset 0 2px 0 rgba(255,255,255,0.34);
            color: rgba(85, 42, 29, 0.96);
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 0.14em;
        }

        .btn::before {
            content: "";
            position: absolute;
            left: 18px;
            top: 50%;
            width: 10px;
            height: 10px;
            border-radius: 999px;
            transform: translateY(-50%);
            background: linear-gradient(180deg, #fff5e7, #ec8b57);
            box-shadow: 0 0 0 5px rgba(255, 243, 225, 0.28);
        }

        .btn.primary {
            background: linear-gradient(180deg, rgba(255, 249, 239, 0.96), rgba(255, 232, 198, 0.92));
        }

        .btn:nth-child(2) {
            background: linear-gradient(180deg, rgba(255, 250, 243, 0.84), rgba(244, 236, 228, 0.78));
        }

        .btn:nth-child(3),
        .btn:nth-child(4) {
            background: rgba(255, 249, 241, 0.64);
        }

        .btn .small {
            margin-left: 12px;
            font-size: 15px;
            letter-spacing: 0.08em;
            font-weight: 700;
            color: rgba(109, 61, 44, 0.72);
        }

        .bottom {
            position: absolute;
            left: 50%;
            bottom: 34px;
            width: 940px;
            transform: translateX(-50%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(88, 45, 32, 0.74);
            font-size: 14px;
            font-weight: 700;
            z-index: 4;
        }

        .bottom .tip {
            padding: 12px 16px;
            border-radius: 999px;
            background: rgba(255, 248, 240, 0.42);
            backdrop-filter: blur(8px);
        }

        .bottom .version {
            letter-spacing: 0.12em;
        }

        .side-copy {
            position: absolute;
            top: 244px;
            width: 220px;
            font-size: 15px;
            line-height: 1.9;
            font-weight: 700;
            z-index: 3;
        }

        .side-copy.left {
            left: 72px;
            color: rgba(78, 101, 129, 0.9);
            text-align: left;
        }

        .side-copy.right {
            right: 72px;
            color: rgba(132, 62, 37, 0.88);
            text-align: right;
        }

        .side-copy .cap {
            display: inline-block;
            margin-bottom: 14px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 248, 240, 0.38);
            font-size: 12px;
            letter-spacing: 0.18em;
        }
    </style>
</head>
<body>
    <main class="screen">
        <div class="bg-ornament">
            <div class="ring left"></div>
            <div class="ring right"></div>
            <div class="arc left"></div>
            <div class="arc right"></div>
        </div>

        <div class="settings">⚙</div>

        <section class="header">
            <div class="eyebrow">MAIN MENU</div>
            <div class="plaque-wrap">
                <div class="plaque-shadow"></div>
                <div class="plaque">
                    <h1 class="title"><span class="cold">冷面</span><span class="warm">人生</span></h1>
                </div>
            </div>
            <div class="subtitle">
                一个人，一辆摊车，一段把冷脸活成热气的生活。
                <span class="brush">慢慢开张</span>
            </div>
        </section>

        <section class="side-copy left">
            <div class="cap">外冷</div>
            把克制、沉默和不擅表达的那一面，
            留在偏冷的空气里。
        </section>

        <section class="side-copy right">
            <div class="cap">内热</div>
            把烟火、温度和被治愈的心情，
            放进烤冷面的香气里。
        </section>

        <section class="menu">
            <div class="btn primary">开始游戏 <span class="small">从第一天开张</span></div>
            <div class="btn">继续游戏 <span class="small">回到已有存档</span></div>
            <div class="btn">设置</div>
            <div class="btn">退出游戏</div>
        </section>

        <section class="bottom">
            <div class="tip">完成第一关后解锁场景选择与经营准备阶段</div>
            <div class="version">VER 0.1 PROTOTYPE</div>
        </section>
    </main>
</body>
</html>
